# moat site configuration
# Place as config.toml in your docs/ directory.

# Site name — used in templates as {{ .SiteName }}
site_name = "My Project"

# Base path — for GitHub project pages served under /repo-name/
# Leave empty for custom domains or root-level sites.
# base_path = "/my-project"

# Footer text rendered below the page content. Markdown links are allowed.
# footer_text = "© [you](https://example.com) 2026"
# disable_moat_citation = false

# Syntax highlighting themes (Chroma)
# See all themes: https://xyproto.github.io/splash/docs/
[highlight]
light = "github"          # Used by default
dark  = "github-dark"     # Used when [data-theme="dark"]

# Popular pairs:
#   github / github-dark
#   catppuccin-latte / catppuccin-mocha
#   tokyonight-day / tokyonight-night
#   gruvbox-light / gruvbox
#   rose-pine-dawn / rose-pine-moon
#   solarized-light / solarized-dark
#   xcode / xcode-dark
#   modus-operandi / modus-vivendi

# Built-in client-side search
# Enabled by default in the built-in oat layout.
# [search]
# enabled = false

# Sidebar links — rendered above the page navigation
# [[links]]
# title = "GitHub"
# url = "https://github.com/you/project"
# icon = "github"

# Top navigation links (right side of the topnav bar)
# [[topnav]]
# title = "Quickstart"
# url = "/guide/quickstart/"
#
# [[topnav]]
# title = "Reference"
# url = "/reference/github-actions/"
#
# Secondary links grouped under the built-in More dropdown.
# [[topnav_more]]
# title = "GitHub"
# url = "https://github.com/you/project"
# icon = "github"

# RSS feed (disabled by default)
# Only pages with a date are included (YYYY-MM-DD or YYYY-MM-DD HH:MM).
# [feed]
# enabled = true
# link = "https://docs.example.com"
# title = "My Site Feed"

# Extra variables — available in templates as {{ .Site.key }}
# [extra]
# tagline = "My project tagline"
# footer = '<a href="https://example.com">Legacy footer HTML</a>'  # Backward-compatible fallback
